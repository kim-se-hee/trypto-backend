networks:
  trypto-net:
    name: trypto-net

services:
  # ---------- infra ----------
  mysql:
    image: mysql:8.0.30
    networks:
      - trypto-net
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: trypto
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.14.0
    networks:
      - trypto-net
    environment:
      DATA_SOURCE_NAME: "root:1234@(mysql:3306)/"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - trypto-net
    command:
      - redis-server
      - --port
      - "6379"
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    networks:
      - trypto-net
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2-alpine
    networks:
      - trypto-net
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ./docker/influxdb/init-tasks.sh:/docker-entrypoint-initdb.d/init-tasks.sh
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: trypto
      DOCKER_INFLUXDB_INIT_BUCKET: ticker
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: trypto-collector-token
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- app ----------
  collector:
    build: ./collector
    image: ${COLLECTOR_IMAGE:-kimsehee98/trypto-collector:v1}
    networks:
      - trypto-net
    ports:
      - "8081:8081"
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_RABBITMQ_HOST: rabbitmq
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: trypto-collector-token
      DB_HOST: mysql
      DB_USERNAME: root
      DB_PASSWORD: 1234
      MANAGEMENT_PORT: 9090
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9090/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  backend:
    build: ./api
    image: ${API_IMAGE:-kimsehee98/trypto-api:v1}
    networks:
      - trypto-net
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: trypto
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: 1234
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: trypto-collector-token
      COMPENSATION_BOUNDARY_SECONDS: "30"
      COMPENSATION_INTERVAL_MS: "30000"
    depends_on:
      collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 240s

  engine:
    build: ./engine
    image: ${ENGINE_IMAGE:-kimsehee98/trypto-engine:v1}
    networks:
      - trypto-net
    ports:
      - "8082:8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - engine-wal:/wal
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: trypto
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: 1234
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      ENGINE_WAL_DIR: /wal
      MANAGEMENT_PORT: "8082"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 120s

  # ---------- monitoring ----------
  prometheus:
    image: prom/prometheus:latest
    networks:
      - trypto-net
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    networks:
      - trypto-net
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    networks:
      - trypto-net
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    networks:
      - trypto-net
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - --path.rootfs=/host
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  influxdb-data:
  engine-wal:
  prometheus-data:
  grafana-data:
