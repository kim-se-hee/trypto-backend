spring:
  application:
    name: trypto-backend
  datasource:
    url: jdbc:h2:mem:trypto;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    hikari:
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        rewriteBatchedStatements: true
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

influxdb:
  url: ${INFLUXDB_URL:http://localhost:8086}
  token: ${INFLUXDB_TOKEN:}
  org: ${INFLUXDB_ORG:trypto}
  bucket: ${INFLUXDB_BUCKET:candles}

app:
  websocket:
    endpoint: /ws
    heartbeat-send: 10000
    heartbeat-receive: 10000
  exchanges:
    - name: UPBIT
      market-type: DOMESTIC
      base-currency-symbol: KRW
      fee-rate: 0.0005
    - name: BITHUMB
      market-type: DOMESTIC
      base-currency-symbol: KRW
      fee-rate: 0.0025
    - name: BINANCE
      market-type: OVERSEAS
      base-currency-symbol: USDT
      fee-rate: 0.001
