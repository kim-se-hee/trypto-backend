spring:
  application:
    name: trypto-backend
  datasource:
    url: jdbc:h2:mem:trypto;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        globally_quoted_identifiers: true
    open-in-view: false
